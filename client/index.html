    <!--
      Crash-signal suppressor. Runs before any module script so it registers
      ahead of the platform health monitor and uses capture:true to fire first.
      Filters out benign non-Error events (ResizeObserver loop notifications,
      browser-extension noise) that would otherwise trigger a false "crashed"
      alert. Real Error throws still propagate.
    -->
    <script>
      (function () {
        var benignMessages = [
          "ResizeObserver loop completed with undelivered notifications.",
          "ResizeObserver loop limit exceeded",
        ];
        function isBenign(msg) {
          if (!msg) return false;
          for (var i = 0; i < benignMessages.length; i++) {
            if (msg.indexOf(benignMessages[i]) !== -1) return true;
          }
          return false;
        }
        window.addEventListener("error", function (e) {
          var v = e.error;
          if (!(v instanceof Error) || isBenign(e.message)) {
            try { console.warn("[non-Error error event suppressed]", { message: e.message, value: v }); } catch (_) {}
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
        window.addEventListener("unhandledrejection", function (e) {
          if (!(e.reason instanceof Error)) {
            try { console.warn("[non-Error rejection suppressed]", e.reason); } catch (_) {}
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
